<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick URL Shortener on Azure</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Quick URL Shortener on Azure</h1>

        <div class="space-y-4">
            <input type="url" id="full_url" placeholder="วางลิงก์ยาวๆ ที่นี่..."
                class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">

            <button onclick="shortenURL()"
                class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
                ย่อลิงก์เลย!
            </button>
        </div>

        <div id="result" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-md">
            <p class="text-sm text-green-700 mb-1">ยินดีด้วย! ลิงก์ของคุณคือ:</p>
            <a id="short_url" href="#" target="_blank" class="text-blue-600 font-bold break-all hover:underline"></a>
        </div>
    </div>

    <script>
        async function shortenURL() {
            const fullUrl = document.getElementById('full_url').value;
            if (!fullUrl) return alert("กรุณาใส่ URL ก่อนครับ");

            // ส่งข้อมูลไปที่ @app.post("/shorten") ของ FastAPI
            const response = await fetch(`/shorten?full_url=${encodeURIComponent(fullUrl)}`, {
                method: 'POST'
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('short_url').innerText = data.short_url;
                document.getElementById('short_url').href = data.short_url;
            } else {
                alert("เกิดข้อผิดพลาด: " + data.detail);
            }
        }
    </script>
</body>

</html>
